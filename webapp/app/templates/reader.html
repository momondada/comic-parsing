<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ comic }} 第{{ chapter_display }}話 - Comic Reader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="reader-page">
  <div class="reader-nav">
    <a href="/library/{{ comic }}">{{ comic }} - 第 {{ chapter_display }} 話</a>
    <button id="translate-toggle" class="rescrape-btn" style="display:none;">隱藏翻譯</button>
  </div>
  <div class="reader-nav chapter-nav">
    {% if prev_chapter %}
    <a class="chapter-nav-btn" href="/reader/{{ comic }}/{{ prev_chapter.RowKey }}">
      上一話（{{ prev_chapter.chapter_display }}）
    </a>
    {% else %}
    <span class="chapter-nav-btn disabled">上一話</span>
    {% endif %}
    <span class="chapter-nav-current">當前話數：{{ chapter_display }}</span>
    {% if next_chapter %}
    <a class="chapter-nav-btn" href="/reader/{{ comic }}/{{ next_chapter.RowKey }}">
      下一話（{{ next_chapter.chapter_display }}）
    </a>
    {% else %}
    <span class="chapter-nav-btn disabled">下一話</span>
    {% endif %}
  </div>
  <div class="reader">
    {% for filename in filenames %}
    <div class="page" data-filename="{{ filename }}">
      <img src="/media/{{ comic }}/{{ chapter_row_key }}/{{ filename }}" loading="lazy" alt="page {{ loop.index }}" />
    </div>
    {% endfor %}
  </div>
  <div class="reader-nav">
    <a href="/library/{{ comic }}">回到章節列表</a>
  </div>

  <script>
    const comic = "{{ comic }}";
    const chapterRowKey = "{{ chapter_row_key }}";
    const toggleBtn = document.getElementById("translate-toggle");
    let translationsVisible = true;

    function renderBubbles(pages) {
      document.querySelectorAll(".page").forEach((pageEl) => {
        const filename = pageEl.dataset.filename;
        const bubbles = pages[filename];
        if (!bubbles || bubbles.length === 0) return;

        bubbles.forEach((b) => {
          const div = document.createElement("div");
          div.className = "bubble";
          // Anchor on the detected bubble's center and let the box size
          // itself to whatever text ends up inside (en+zh together is
          // usually longer/taller than the single original OCR line the
          // bbox was measured from) — a fixed width/height would leave the
          // background too small and text spilling outside it.
          div.style.left = `${b.left_pct + b.width_pct / 2}%`;
          div.style.top = `${b.top_pct + b.height_pct / 2}%`;
          div.style.maxWidth = `${Math.max(b.width_pct, 12)}%`;

          const enEl = document.createElement("div");
          enEl.className = "bubble-en";
          enEl.textContent = b.text_en;

          const zhEl = document.createElement("div");
          zhEl.className = "bubble-zh";
          zhEl.textContent = b.text_zh;

          div.appendChild(enEl);
          div.appendChild(zhEl);
          pageEl.appendChild(div);
        });
      });

      toggleBtn.style.display = "inline-block";
    }

    toggleBtn.addEventListener("click", () => {
      translationsVisible = !translationsVisible;
      document.querySelectorAll(".bubble").forEach((el) => {
        el.style.display = translationsVisible ? "flex" : "none";
      });
      toggleBtn.textContent = translationsVisible ? "隱藏翻譯" : "顯示翻譯";
    });

    fetch(`/api/chapters/${encodeURIComponent(comic)}/${chapterRowKey}/translations`)
      .then((res) => (res.ok ? res.json() : null))
      .then((data) => {
        if (data && data.pages) renderBubbles(data.pages);
      })
      .catch(() => {});
  </script>
</body>
</html>
