<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的書櫃 - Comic Reader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>我的書櫃</h1>
  <p><a href="/">回到下載頁面</a></p>

  {% if comics %}
  <ul class="card-list">
    {% for comic in comics %}
    <li class="comic-row">
      <a href="/library/{{ comic }}">{{ display_names.get(comic, comic) }}</a>
      <button class="rename-btn" data-comic="{{ comic }}">重新命名</button>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p>還沒有任何漫畫，去下載一話吧。</p>
  {% endif %}

  <script>
    document.querySelectorAll(".rename-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const comic = btn.dataset.comic;
        const nameEl = btn.previousElementSibling;
        const current = nameEl.textContent.trim();
        const next = window.prompt("輸入書名：", current);
        if (next === null) return;
        const trimmed = next.trim();
        if (!trimmed || trimmed === current) return;

        btn.disabled = true;
        const res = await fetch(`/api/comics/${encodeURIComponent(comic)}/name`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ display_name: trimmed }),
        });
        btn.disabled = false;

        if (res.ok) {
          nameEl.textContent = trimmed;
        } else {
          alert("更新失敗");
        }
      });
    });
  </script>
</body>
</html>
