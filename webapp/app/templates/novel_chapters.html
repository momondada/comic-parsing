<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ display_name }} - Comic Reader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>{{ display_name }}</h1>
  <p><a href="/library">回到書櫃</a></p>
  <p><a href="/api/novels/{{ comic }}/download" class="rescrape-btn">下載全部話數 txt</a></p>

  <h2>章節列表</h2>
  <ul class="card-list">
    {% for chapter in chapters %}
    <li class="chapter-row">
      <a href="/reader/{{ comic }}/{{ chapter.RowKey }}">{{ chapter.chapter_display }}</a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
