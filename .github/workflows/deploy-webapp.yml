name: Deploy Comic Reader Webapp

on:
  push:
    branches: [master]
    paths:
      - "webapp/**"
      - ".github/workflows/deploy-webapp.yml"
  workflow_dispatch:

# Serialize deploys: without this, overlapping runs from rapid pushes can
# finish out of order and an older run's deploy step overwrites a newer one.
concurrency:
  group: deploy-webapp
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/comic-parsing-webapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./webapp
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      # Skipped until the AZURE_WEBAPP_NAME repository variable is set
      # (see scripts/provision_azure.sh) — lets this workflow validate the
      # Docker build alone before Azure resources exist.
      - name: Deploy to Azure Web App
        if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
